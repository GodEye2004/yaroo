version: "3.9"

services:
  backend:
    build: ./backend
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app_net

  db:
    image: postgres:16
    container_name: ai_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432" # برای دسترسی از لوکال
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net

networks:
  app_net:

volumes:
  postgres_data:
